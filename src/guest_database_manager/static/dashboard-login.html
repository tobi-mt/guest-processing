<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Login</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4efe6;
        --panel: #fffaf2;
        --border: rgba(91, 70, 47, 0.14);
        --text: #2d241a;
        --muted: #705b45;
        --accent: #145a4a;
        --danger: #8f2d1f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(255, 215, 164, 0.65), transparent 32%),
          linear-gradient(180deg, #f8f3eb 0%, #efe6d8 100%);
        color: var(--text);
      }

      .card {
        width: min(440px, 100%);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 24px;
        box-shadow: 0 20px 60px rgba(61, 40, 18, 0.1);
      }

      h1 {
        margin: 0 0 6px;
        font-size: 1.5rem;
      }

      p {
        margin: 0 0 16px;
        color: var(--muted);
      }

      form {
        display: grid;
        gap: 12px;
      }

      label {
        display: grid;
        gap: 6px;
        font-weight: 600;
      }

      input {
        width: 100%;
        padding: 11px 12px;
        border-radius: 12px;
        border: 1px solid rgba(91, 70, 47, 0.2);
        background: #fff;
        font: inherit;
      }

      button {
        margin-top: 6px;
        border: 0;
        border-radius: 999px;
        padding: 12px 16px;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .message {
        min-height: 1.4rem;
        margin: 6px 0 0;
        font-size: 0.95rem;
      }

      .message.error {
        color: var(--danger);
      }
    </style>
  </head>
  <body>
    <section class="card">
      <h1>Dashboard Login</h1>
      <p>Sign in to access the dashboard, planning, and operations pages.</p>
      <form id="login-form">
        <label>
          Username
          <input id="username" name="username" type="text" autocomplete="username" required />
        </label>
        <label>
          Password
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </label>
        <button id="submit" type="submit">Sign In</button>
        <p id="message" class="message" aria-live="polite"></p>
      </form>
    </section>

    <script>
      const form = document.getElementById("login-form");
      const message = document.getElementById("message");
      const submit = document.getElementById("submit");

      function setMessage(text, tone = "") {
        message.textContent = text;
        message.className = `message ${tone}`.trim();
      }

      function nextPath() {
        const params = new URLSearchParams(window.location.search);
        const value = params.get("next") || "/dashboard";
        return value.startsWith("/") ? value : "/dashboard";
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        submit.disabled = true;
        submit.textContent = "Signing in...";
        setMessage("");

        const payload = {
          username: form.username.value.trim(),
          password: form.password.value,
          next: nextPath(),
        };

        try {
          const response = await fetch("/api/dashboard/login", {
            method: "POST",
            credentials: "same-origin",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error || "Login failed");
          }

          window.location.href = data.redirect_to || payload.next;
        } catch (error) {
          setMessage(error.message || "Login failed", "error");
        } finally {
          submit.disabled = false;
          submit.textContent = "Sign In";
        }
      });
    </script>
  </body>
</html>
